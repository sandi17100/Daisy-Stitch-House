{% extends 'base.html' %}
{% block hero_section %}
    <h1 style="font-family: var(--font-fancy); font-size: 42px; color: var(--text-dark); margin:0;">Catalog Form Controls</h1>
{% endblock %}

{% block content %}
<div class="scrap-card" style="max-width: 700px; margin: 0 auto; --tilt: -0.5;">
    <h3 style="font-family: var(--font-fancy); color: var(--dark-pink); margin-top: 0; font-size: 24px;">Configure Creation Blueprint</h3>
    
    <form method="POST" id="blueprintForm" style="display: flex; flex-direction: column; gap: 20px;">
        <div>
            <label style="font-size: 14px; font-weight: bold; display: block; margin-bottom: 6px;">Amigurumi Name</label>
            <input type="text" name="title" required value="{{ product.title if product else '' }}" style="width: 100%; box-sizing: border-box;">
        </div>
        
        <div style="display: flex; gap: 15px;">
            <div style="flex: 1;">
                <label style="font-size: 14px; font-weight: bold; display: block; margin-bottom: 6px;">Price (MMK)</label>
                <input type="number" step="0.01" name="price" required value="{{ product.price if product else '' }}" style="width: 100%; box-sizing: border-box;">
            </div>
            <div style="flex: 1;">
                <label style="font-size: 14px; font-weight: bold; display: block; margin-bottom: 6px;">Stock Registry</label>
                <input type="number" name="stock" required value="{{ product.stock if product else '5' }}" style="width: 100%; box-sizing: border-box;">
            </div>
        </div>
        
        <div>
            <label style="font-size: 14px; font-weight: bold; display: block; margin-bottom: 6px;">Image URL(s)</label>
            <input type="text" name="image_url" value="{{ product.image_url if product else '' }}" placeholder="url1.jpg, url2.jpg" style="width: 100%; box-sizing: border-box;">
        </div>
        
        <div>
            <label style="font-size: 14px; font-weight: bold; display: block; margin-bottom: 6px;">Biography / Description</label>
            
            <div style="background: #FAF4E5; border: 3px solid var(--text-dark); border-bottom: none; padding: 8px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
                <button type="button" onclick="execCmd('bold')" style="font-weight:bold; padding:4px 10px; cursor:pointer; background:white; border:2px solid #2A2A2A;">B</button>
                <button type="button" onclick="execCmd('italic')" style="font-style:italic; padding:4px 10px; cursor:pointer; background:white; border:2px solid #2A2A2A;">I</button>
                <button type="button" onclick="execCmd('underline')" style="text-decoration:underline; padding:4px 10px; cursor:pointer; background:white; border:2px solid #2A2A2A;">U</button>
                <button type="button" onclick="execCmd('formatBlock', 'H4')" style="font-weight:bold; padding:4px 6px; cursor:pointer; background:white; border:2px solid #2A2A2A; font-size:12px;">Heading</button>
                <button type="button" onclick="execCmd('insertUnorderedList')" style="padding:4px 6px; cursor:pointer; background:white; border:2px solid #2A2A2A; font-size:12px;">• List</button>
                
                <div style="display: flex; align-items: center; gap: 4px; margin-left: auto; background: white; padding: 2px 6px; border: 2px solid #2A2A2A;">
                    <label style="font-size:11px; font-weight:bold;">Text Color:</label>
                    <input type="color" id="txtColor" onchange="execCmd('foreColor', this.value)" style="padding:0; width:24px; height:24px; border:none; background:transparent; cursor:pointer;">
                </div>
            </div>

            <div id="richEditor" contenteditable="true" style="width: 100%; min-height: 200px; max-height: 400px; overflow-y: auto; padding: 15px; border: 3px solid var(--text-dark); background: #FFFEEF; box-sizing: border-box; font-family: var(--font-round); line-height: 1.5;">
                {{ product.description|safe if product else '' }}
            </div>

            <input type="hidden" name="description" id="hiddenDescription">
        </div>
        
        <button type="submit" class="btn-candy" style="background: var(--accent-pink); margin-top: 10px; font-size: 16px;">
            Write to System Database Core 💾
        </button>
    </form>
</div>

<script>
    function execCmd(command, value = null) {
        document.execCommand(command, false, value);
        document.getElementById('richEditor').focus();
    }

    // Capture the text rich html layout and pack it seamlessly into the form before sending
    document.getElementById('blueprintForm').addEventListener('submit', function(e) {
        var htmlContent = document.getElementById('richEditor').innerHTML;
        // Basic fallback configuration if left empty
        if(htmlContent === '<br>' || htmlContent.trim() === '') {
            htmlContent = '';
        }
        document.getElementById('hiddenDescription').value = htmlContent;
    });
</script>
{% endblock %}
