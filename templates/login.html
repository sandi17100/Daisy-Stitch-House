{% extends 'base.html' %}
{% block content %}
<div class="scrap-card" style="max-width: 400px; margin: 60px auto; --tilt: 1; text-align: center; background: #FFFEEF;">
    <h3 style="font-family: var(--font-fancy); color: var(--dark-pink); margin-top: 0; font-size: 26px;">Admin Gateway</h3>
    {% if error %}<p style="color: red; font-size: 13px; font-weight: bold;">[!] {{ error }}</p>{% endif %}
    
    <form method="POST" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
        <input type="text" name="username" placeholder="Username" required style="width: 100%; box-sizing: border-box; padding: 12px;">
        <input type="password" name="password" placeholder="Password" required style="width: 100%; box-sizing: border-box; padding: 12px;">
        <button type="submit" class="btn-candy" style="background: #CBE5A3; width: 100%; font-size: 16px;">Authenticate 🔓</button>
    </form>
</div>
{% endblock %}
